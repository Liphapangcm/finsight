name: FinSight CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false          # run both Python versions even if one fails
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Python setup ──────────────────────────────────────────
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip               # cache the pip download cache

      # ── 3. Install dependencies ──────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install ruff mypy pytest pytest-cov

      # ── 4. Lint — scoped to core/ and tests/ only ────────────────
      # app/ contains long inline HTML strings that trip line-length
      # rules. We only lint the pure Python business logic.
      - name: Lint with ruff
        run: |
          ruff check core/ tests/ --ignore E501

      # ── 5. Type check — scoped to core/ only ─────────────────────
      # app/ uses Streamlit which has incomplete stubs.
      # database/ uses SQLAlchemy dynamic attributes.
      # Both cause spurious mypy errors — only check core/.
      - name: Type check with mypy
        run: |
          mypy core/ \
            --ignore-missing-imports \
            --no-strict-optional \
            --allow-untyped-defs \
            --allow-incomplete-defs

      # ── 6. Run tests with coverage ───────────────────────────────
      - name: Run tests
        env:
          PYTHONPATH: .
        run: |
          pytest tests/ \
            --cov=core \
            --cov=database \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-report=term-missing \
            -v

      # ── 7. Upload HTML coverage report ───────────────────────────
      # Each matrix leg uploads under a unique name so they don't
      # overwrite each other.
      - name: Upload coverage HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-py${{ matrix.python-version }}
          path: htmlcov/
          if-no-files-found: warn

      # ── 8. Upload coverage XML (for badges / external tools) ─────
      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-py${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: warn