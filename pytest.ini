[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Coverage defaults (used when running pytest without explicit flags)
addopts =
    --cov=core
    --cov=database
    --cov-report=term-missing
    --cov-report=xml:coverage.xml
    --cov-report=html:htmlcov
    -v

# Suppress known third-party deprecation warnings that we can't fix
filterwarnings =
    ignore::DeprecationWarning:google.*:
    ignore::DeprecationWarning:pyparsing.*:
    ignore::DeprecationWarning:matplotlib.*:
    ignore::DeprecationWarning:sqlalchemy.*:
    ignore::DeprecationWarning:streamlit.*:

# Minimum version guard
minversion = 7.0