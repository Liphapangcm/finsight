# render.yaml
services:
  - type: web
    name: finsight
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app/main.py --server.port=$PORT --server.headless=true
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./finsight.db
      - key: MODEL_VERSION
        value: v1.0.0
    disk:
      name: finsight-data
      mountPath: /opt/render/project/src
      sizeGB: 1